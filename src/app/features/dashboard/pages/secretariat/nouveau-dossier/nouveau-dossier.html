<div class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 p-6 animate-fadeIn">
  <div class="max-w-4xl mx-auto">
    
    <!-- En-tête avec logo -->
    <div class="mb-8">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between">
        <div class="flex items-center space-x-4">
          <div class="h-14 w-14 bg-gradient-to-br from-blue-700 to-blue-800 rounded-2xl flex items-center justify-center shadow-lg">
            <img src="images/logo-onama.png.webp" class="h-10 w-10 object-contain">
          </div>
          <div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent">
              Nouveau dossier stagiaire
            </h1>
            <p class="text-gray-500 mt-1">Bureau du Secrétariat - Enregistrement des stages</p>
          </div>
        </div>
        <div class="mt-2 md:mt-0">
          <div class="flex items-center space-x-2 text-gray-400 text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span>Formulaire d'enregistrement</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Message de notification -->
    <div *ngIf="message" 
         class="mb-6 p-4 rounded-xl flex items-center space-x-3 animate-slideDown"
         [ngClass]="{
           'bg-green-50 text-green-700 border border-green-200': messageType === 'success',
           'bg-red-50 text-red-700 border border-red-200': messageType === 'error'
         }">
      <span class="text-xl">{{ messageType === 'success' ? '✅' : '❌' }}</span>
      <span class="flex-1">{{ message }}</span>
      <button *ngIf="messageType === 'success'" (click)="message = ''" class="text-green-700 hover:text-green-900">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Formulaire principal -->
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
      
      <!-- En-tête du formulaire -->
      <div class="bg-gradient-to-r from-blue-600 to-sky-500 px-6 py-4">
        <div class="flex items-center space-x-3">
          <div class="h-10 w-10 bg-white/20 rounded-xl flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
          </div>
          <h2 class="text-white font-semibold text-lg">Informations du stagiaire</h2>
        </div>
      </div>

      <!-- Corps du formulaire -->
      <div class="p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          
          <!-- Nom -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              Nom <span class="text-red-500">*</span>
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
              </div>
              <input 
                type="text"
                [(ngModel)]="form.nom"
                class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                placeholder="Nom du stagiaire"
              >
            </div>
            <div *ngIf="form.nom && form.nom.length < 2" class="mt-1 text-xs text-red-500">
              Minimum 2 caractères
            </div>
          </div>

          <!-- Prénom -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              Prénom <span class="text-red-500">*</span>
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
              </div>
              <input 
                type="text"
                [(ngModel)]="form.prenom"
                class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                placeholder="Prénom du stagiaire"
              >
            </div>
            <div *ngIf="form.prenom && form.prenom.length < 2" class="mt-1 text-xs text-red-500">
              Minimum 2 caractères
            </div>
          </div>

          <!-- Téléphone -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              Téléphone
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                </svg>
              </div>
              <input 
                type="tel"
                [(ngModel)]="form.telephone"
                class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                placeholder="+235 XX XX XX XX"
              >
            </div>
          </div>

          <!-- Université -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              Université / École <span class="text-red-500">*</span>
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                </svg>
              </div>
              <input 
                type="text"
                [(ngModel)]="form.universite"
                class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                placeholder="Nom de l'université ou école"
              >
            </div>
          </div>

          <!-- Type de stage (pleine largeur) -->
          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-gray-700 mb-3">
              Type de stage
            </label>
            <div class="flex flex-wrap gap-4">
              <label class="relative flex items-center p-4 rounded-xl border-2 cursor-pointer transition-all"
                     [ngClass]="form.type === 'ACADEMIQUE' ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:border-gray-300'">
                <input type="radio" value="ACADEMIQUE" [(ngModel)]="form.type" class="sr-only">
                <div class="flex items-center space-x-3">
                  <div class="h-10 w-10 rounded-full bg-blue-100 flex items-center justify-center">
                    <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path d="M12 14l9-5-9-5-9 5 9 5z"></path>
                      <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path>
                    </svg>
                  </div>
                  <div>
                    <p class="font-semibold text-gray-800">Académique</p>
                    <p class="text-xs text-gray-500">Stage de fin d'études</p>
                  </div>
                </div>
                <div class="absolute top-2 right-2">
                  <div *ngIf="form.type === 'ACADEMIQUE'" class="w-4 h-4 bg-blue-500 rounded-full"></div>
                </div>
              </label>

              <label class="relative flex items-center p-4 rounded-xl border-2 cursor-pointer transition-all"
                     [ngClass]="form.type === 'PERFECTIONNEMENT' ? 'border-purple-500 bg-purple-50' : 'border-gray-200 hover:border-gray-300'">
                <input type="radio" value="PERFECTIONNEMENT" [(ngModel)]="form.type" class="sr-only">
                <div class="flex items-center space-x-3">
                  <div class="h-10 w-10 rounded-full bg-purple-100 flex items-center justify-center">
                    <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                  </div>
                  <div>
                    <p class="font-semibold text-gray-800">Perfectionnement</p>
                    <p class="text-xs text-gray-500">Stage professionnel</p>
                  </div>
                </div>
                <div class="absolute top-2 right-2">
                  <div *ngIf="form.type === 'PERFECTIONNEMENT'" class="w-4 h-4 bg-purple-500 rounded-full"></div>
                </div>
              </label>
            </div>
          </div>
        </div>

        <!-- Boutons d'action -->
        <div class="flex flex-col sm:flex-row gap-3 mt-8 pt-6 border-t border-gray-100">
          <button 
            (click)="annuler()"
            class="flex-1 px-6 py-3 border border-gray-200 rounded-xl text-gray-600 font-medium hover:bg-gray-50 transition-all">
            Annuler
          </button>
          <button 
            (click)="enregistrer()"
            [disabled]="isLoading || !formulaireValide"
            class="flex-1 px-6 py-3 bg-gradient-to-r from-blue-600 to-sky-500 text-white rounded-xl font-semibold hover:from-blue-700 hover:to-sky-600 transition-all transform hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed shadow-md">
            <span *ngIf="!isLoading" class="flex items-center justify-center space-x-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path>
              </svg>
              <span>Enregistrer le dossier</span>
            </span>
            <span *ngIf="isLoading" class="flex items-center justify-center space-x-2">
              <svg class="animate-spin w-5 h-5" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              <span>Enregistrement...</span>
            </span>
          </button>
        </div>

        <!-- Champs obligatoires -->
        <p class="text-xs text-gray-400 mt-4 text-center">
          <span class="text-red-500">*</span> Champs obligatoires
        </p>
      </div>
    </div>

    <!-- Pied de page -->
    <div class="mt-6 text-center">
      <div class="flex items-center justify-center space-x-2">
        <div class="w-2 h-2 rounded-full bg-green-500"></div>
        <span class="text-xs text-gray-400">Formulaire sécurisé - Données cryptées</span>
      </div>
    </div>
  </div>
</div>
