<div class="relative">
  <!-- Bouton de notification -->
  <button (click)="toggleDropdown()" 
          class="relative w-full py-3 bg-sky-700 hover:bg-sky-600 rounded-xl font-medium transition-all flex items-center justify-center space-x-2">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
    </svg>
    <span>Notifications</span>
    <span *ngIf="nonLues > 0" 
          class="absolute -top-1 -right-1 h-5 w-5 bg-red-500 rounded-full text-xs text-white flex items-center justify-center">
      {{ nonLues > 9 ? '9+' : nonLues }}
    </span>
  </button>
  
  <!-- Dropdown des notifications -->
  <div *ngIf="showDropdown" 
       class="absolute bottom-full mb-2 left-0 w-80 bg-white rounded-xl shadow-lg z-50 overflow-hidden">
    <div class="p-3 bg-gray-50 border-b border-gray-100">
      <h3 class="font-semibold text-gray-800">Notifications</h3>
    </div>
    <div class="max-h-96 overflow-y-auto">
      <div *ngFor="let n of notifications" 
           class="p-3 border-b border-gray-100 hover:bg-gray-50 cursor-pointer transition"
           [class.bg-blue-50]="!n.lu"
           (click)="marquerCommeLu(n)">
        <div class="flex items-start space-x-3">
          <div class="w-8 h-8 rounded-full bg-sky-100 flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-sky-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
          </div>
          <div class="flex-1">
            <p class="text-sm font-medium text-gray-800">{{ n.prenom }} {{ n.nom }}</p>
            <p class="text-xs text-gray-500">📄 Nouvelle lettre déposée</p>
            <p class="text-xs text-gray-400 mt-1">{{ n.date }}</p>
          </div>
          <div *ngIf="!n.lu" class="w-2 h-2 rounded-full bg-blue-500"></div>
        </div>
      </div>
      <div *ngIf="notifications.length === 0" class="p-6 text-center">
        <p class="text-sm text-gray-400">Aucune notification</p>
      </div>
    </div>
    <div class="p-2 border-t border-gray-100 text-center bg-gray-50">
      <a routerLink="/dashboard/secretariat/lettres" 
         class="text-xs text-sky-600 hover:text-sky-700">
        Voir toutes les lettres
      </a>
    </div>
  </div>
</div>
